<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تبدیل متن یا PDF به پادکست</title>
<!--
  این صفحه رو می‌تونید روی GitHub Pages یا Cloudflare Pages میزبانی
  کنید — فقط یک فایل HTML ساده‌ست، کاملاً استاتیک.

  ⚠️ قبل از استفاده، خط پایین (WORKER_URL) رو با آدرس واقعی
  Cloudflare Worker خودتون (بعد از دیپلوی) جایگزین کنید.
-->
<style>
  body { font-family: Tahoma, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; line-height: 1.8; }
  textarea { width: 100%; min-height: 120px; padding: 0.5rem; font-family: inherit; }
  button { padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; margin-top: 1rem; background: #1e3a5f; color: #fff; border: none; border-radius: 6px; }
  .result { margin-top: 1rem; padding: 0.8rem; border-radius: 6px; }
  .result.ok { background: #e6f4ea; }
  .result.error { background: #fdecea; }
  .note { font-size: 0.85rem; color: #666; }
</style>
</head>
<body>

<h1>🎙️ تبدیل متن به پادکست</h1>
<p class="note">⚠️ پردازش روی GitHub Actions انجام می‌شه — معمولاً ۱ تا ۳ دقیقه طول می‌کشه، نه فوری.</p>

<label for="text-input">متن شما</label>
<textarea id="text-input" placeholder="متنی که می‌خواید به صدا تبدیل بشه رو اینجا بنویسید..."></textarea>

<button onclick="submitText()">تبدیل به صدا</button>

<div id="result"></div>

<script>
  // ⚠️ این آدرس رو با آدرس واقعی Cloudflare Worker خودتون (بعد از deploy) جایگزین کنید
  const WORKER_URL = "https://YOUR-WORKER-NAME.YOUR-SUBDOMAIN.workers.dev";

  async function submitText() {
    const text = document.getElementById("text-input").value.trim();
    const resultEl = document.getElementById("result");

    if (!text) {
      resultEl.className = "result error";
      resultEl.textContent = "لطفاً متنی وارد کنید.";
      return;
    }

    resultEl.className = "result";
    resultEl.textContent = "در حال ارسال درخواست...";

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mode: "text", text: text, voice: "fa-IR-DilaraNeural" }),
      });
      const data = await res.json();

      if (data.status === "ok") {
        resultEl.className = "result ok";
        resultEl.textContent = data.message + " " + (data.note || "");
      } else {
        resultEl.className = "result error";
        resultEl.textContent = "خطا: " + data.message;
      }
    } catch (err) {
      resultEl.className = "result error";
      resultEl.textContent = "خطا در اتصال: " + err.message;
    }
  }
</script>

</body>
</html>

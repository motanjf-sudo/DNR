<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNR Podcast Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #94a3b8;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            color: #cbd5e1;
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .input-group textarea,
        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #f1f5f9;
            font-size: 1rem;
        }
        .input-group textarea {
            height: 100px;
            resize: vertical;
        }
        .input-group textarea:focus,
        .input-group input:focus {
            outline: none;
            border-color: #8b5cf6;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        #result {
            margin-top: 25px;
            display: none;
        }
        .audio-player {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
        }
        .audio-player audio {
            width: 100%;
        }
        .download-btn {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #cbd5e1;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .download-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .footer {
            text-align: center;
            color: #475569;
            font-size: 0.8rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🎙️ DNR Studio</h1>
            <p>پادکست دونفره با هوش مصنوعی</p>
        </div>

        <form id="form">
            <div class="input-group">
                <label>📝 موضوع پادکست</label>
                <textarea id="topic" placeholder="مثلاً: آینده هوش مصنوعی"></textarea>
            </div>
            <div class="input-group">
                <label>⏱️ مدت زمان (دقیقه)</label>
                <input type="number" id="duration" value="2" min="1" max="10">
            </div>
            <button type="submit" class="btn" id="generateBtn">✨ ساخت پادکست</button>
        </form>

        <div id="loading">
            <div class="spinner"></div>
            <p>در حال تولید پادکست...</p>
        </div>

        <div id="result">
            <div class="audio-player">
                <audio id="player" controls></audio>
                <button class="download-btn" id="downloadBtn">📥 دانلود پادکست</button>
            </div>
        </div>

        <div class="footer">ساخته شده با ❤️ و Groq (Qwen3.6-27b)</div>
    </div>

    <script>
        const WORKER_URL = "https://tts-gemini.motanjf.workers.dev";

        const form = document.getElementById('form');
        const topic = document.getElementById('topic');
        const duration = document.getElementById('duration');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const player = document.getElementById('player');
        const downloadBtn = document.getElementById('downloadBtn');
        const generateBtn = document.getElementById('generateBtn');

        let combinedAudioBlob = null;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!topic.value.trim()) {
                alert('لطفاً موضوع رو وارد کن');
                return;
            }

            loading.style.display = 'block';
            result.style.display = 'none';
            generateBtn.disabled = true;

            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic: topic.value.trim(),
                        duration: parseInt(duration.value) || 2
                    })
                });

                const data = await res.json();
                if (!res.ok || data.error) throw new Error(data.error || 'خطا');

                if (!data.audioFiles || data.audioFiles.length === 0) {
                    throw new Error('هیچ فایل صوتی تولید نشد');
                }

                // تبدیل Base64 به Blob
                const audioBlobs = data.audioFiles.map(base64 => {
                    const byteChars = atob(base64);
                    const byteArray = new Uint8Array(byteChars.length);
                    for (let i = 0; i < byteChars.length; i++) {
                        byteArray[i] = byteChars.charCodeAt(i);
                    }
                    return new Blob([byteArray], { type: 'audio/mp3' });
                });

                // چسباندن با Web Audio API
                const audioContext = new(window.AudioContext || window.webkitAudioContext)();
                const audioBuffers = [];

                for (const blob of audioBlobs) {
                    const arrayBuffer = await blob.arrayBuffer();
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    audioBuffers.push(audioBuffer);
                }

                const totalLength = audioBuffers.reduce((sum, buf) => sum + buf.length, 0);
                const sampleRate = audioBuffers[0].sampleRate;
                const numberOfChannels = audioBuffers[0].numberOfChannels;

                const combinedBuffer = audioContext.createBuffer(numberOfChannels, totalLength, sampleRate);
                let offset = 0;
                for (const buf of audioBuffers) {
                    for (let channel = 0; channel < numberOfChannels; channel++) {
                        const channelData = combinedBuffer.getChannelData(channel);
                        channelData.set(buf.getChannelData(channel), offset);
                    }
                    offset += buf.length;
                }

                const wavBlob = await audioBufferToWav(combinedBuffer);
                combinedAudioBlob = wavBlob;

                const url = URL.createObjectURL(wavBlob);
                player.src = url;
                result.style.display = 'block';

            } catch (err) {
                alert('❌ خطا: ' + err.message);
            } finally {
                loading.style.display = 'none';
                generateBtn.disabled = false;
            }
        });

        function audioBufferToWav(buffer) {
            return new Promise((resolve) => {
                const numChannels = buffer.numberOfChannels;
                const sampleRate = buffer.sampleRate;
                const format = 1;
                const bitDepth = 16;
                const bytesPerSample = bitDepth / 8;
                const blockAlign = numChannels * bytesPerSample;

                const samples = buffer.getChannelData(0);
                const dataLength = samples.length * blockAlign;
                const bufferLength = 44 + dataLength;

                const arrayBuffer = new ArrayBuffer(bufferLength);
                const view = new DataView(arrayBuffer);

                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) {
                        view.setUint8(offset + i, string.charCodeAt(i));
                    }
                };

                writeString(0, 'RIFF');
                view.setUint32(4, 36 + dataLength, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, format, true);
                view.setUint16(22, numChannels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * blockAlign, true);
                view.setUint16(32, blockAlign, true);
                view.setUint16(34, bitDepth, true);
                writeString(36, 'data');
                view.setUint32(40, dataLength, true);

                const offset = 44;
                for (let i = 0; i < samples.length; i++) {
                    const sample = Math.max(-1, Math.min(1, samples[i]));
                    view.setInt16(offset + i * bytesPerSample, sample * 0x7FFF, true);
                }

                resolve(new Blob([arrayBuffer], { type: 'audio/wav' }));
            });
        }

        downloadBtn.addEventListener('click', () => {
            if (!combinedAudioBlob) return;
            const url = URL.createObjectURL(combinedAudioBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `podcast_${Date.now()}.wav`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>

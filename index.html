<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎙️ DNR Podcast Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #94a3b8;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            color: #cbd5e1;
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .input-group textarea,
        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #f1f5f9;
            font-size: 1rem;
        }
        .input-group textarea {
            height: 100px;
            resize: vertical;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        #result {
            margin-top: 25px;
            display: none;
        }
        .audio-player {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
        }
        .audio-player audio {
            width: 100%;
        }
        .download-btn {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #cbd5e1;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .download-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .footer {
            text-align: center;
            color: #475569;
            font-size: 0.8rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🎙️ DNR Studio</h1>
            <p>پادکست دونفره با Qwen3.6-27b</p>
        </div>

        <form id="form">
            <div class="input-group">
                <label>📝 موضوع</label>
                <textarea id="topic" placeholder="مثلاً: آینده هوش مصنوعی"></textarea>
            </div>
            <div class="input-group">
                <label>⏱️ مدت (دقیقه)</label>
                <input type="number" id="duration" value="2" min="1" max="5" />
            </div>
            <button type="submit" class="btn" id="generateBtn">✨ ساخت پادکست</button>
        </form>

        <div id="loading">
            <div class="spinner"></div>
            <p>در حال ساخت...</p>
        </div>

        <div id="result">
            <div class="audio-player">
                <audio id="player" controls></audio>
                <button class="download-btn" id="downloadBtn">📥 دانلود MP3</button>
            </div>
        </div>

        <div class="footer">با ❤️ و Groq + Gemini</div>
    </div>

    <script>
        const WORKER_URL = "https://tts-gemini.motanjf.workers.dev";

        const form = document.getElementById('form');
        const topic = document.getElementById('topic');
        const duration = document.getElementById('duration');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const player = document.getElementById('player');
        const downloadBtn = document.getElementById('downloadBtn');
        const generateBtn = document.getElementById('generateBtn');

        let combinedBlob = null;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!topic.value.trim()) return alert('لطفاً موضوع رو وارد کن');

            loading.style.display = 'block';
            result.style.display = 'none';
            generateBtn.disabled = true;

            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic: topic.value.trim(),
                        duration: parseInt(duration.value) || 2
                    })
                });

                const data = await res.json();
                if (!res.ok || data.error) throw new Error(data.error || 'خطا');

                if (!data.audioFiles || data.audioFiles.length === 0) {
                    throw new Error('صدایی ساخته نشد');
                }

                const blobs = data.audioFiles.map(base64 => {
                    const byteChars = atob(base64);
                    const byteArray = new Uint8Array(byteChars.length);
                    for (let i = 0; i < byteChars.length; i++) {
                        byteArray[i] = byteChars.charCodeAt(i);
                    }
                    return new Blob([byteArray], { type: 'audio/mp3' });
                });

                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                const buffers = await Promise.all(blobs.map(async b => {
                    const buf = await b.arrayBuffer();
                    return ctx.decodeAudioData(buf);
                }));

                const total = buffers.reduce((s, b) => s + b.length, 0);
                const sr = buffers[0].sampleRate;
                const ch = buffers[0].numberOfChannels;
                const combined = ctx.createBuffer(ch, total, sr);

                let offset = 0;
                for (const buf of buffers) {
                    for (let c = 0; c < ch; c++) {
                        combined.getChannelData(c).set(buf.getChannelData(c), offset);
                    }
                    offset += buf.length;
                }

                combinedBlob = await bufferToWav(combined);
                const url = URL.createObjectURL(combinedBlob);
                player.src = url;
                result.style.display = 'block';

            } catch (err) {
                alert('❌ ' + err.message);
            } finally {
                loading.style.display = 'none';
                generateBtn.disabled = false;
            }
        });

        function bufferToWav(buffer) {
            return new Promise((resolve) => {
                const ch = buffer.numberOfChannels;
                const sr = buffer.sampleRate;
                const samples = buffer.getChannelData(0);
                const dataLen = samples.length * 2;
                const buf = new ArrayBuffer(44 + dataLen);
                const view = new DataView(buf);
                const write = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
                write(0, 'RIFF');
                view.setUint32(4, 36 + dataLen, true);
                write(8, 'WAVE');
                write(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, ch, true);
                view.setUint32(24, sr, true);
                view.setUint32(28, sr * ch * 2, true);
                view.setUint16(32, ch * 2, true);
                view.setUint16(34, 16, true);
                write(36, 'data');
                view.setUint32(40, dataLen, true);
                const off = 44;
                for (let i = 0; i < samples.length; i++) {
                    const s = Math.max(-1, Math.min(1, samples[i]));
                    view.setInt16(off + i * 2, s * 0x7FFF, true);
                }
                resolve(new Blob([buf], { type: 'audio/wav' }));
            });
        }

        downloadBtn.addEventListener('click', () => {
            if (!combinedBlob) return;
            const url = URL.createObjectURL(combinedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `podcast_${Date.now()}.wav`;
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>

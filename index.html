<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNR — پادکست دونفره</title>
<style>
  /* ... همان استایل‌های قبلی ... */
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">DNR</div>
    <h1>پادکست دونفره با <span>Gemini TTS</span></h1>
  </header>

  <div class="card">
    <label class="field-label" for="topicInput">موضوع پادکست</label>
    <textarea id="topicInput" placeholder="موضوع مورد نظر خود را وارد کنید..."></textarea>
    <div class="controls">
      <div class="select-wrap">
        <label class="field-label" for="durationSelect">مدت زمان (دقیقه)</label>
        <select id="durationSelect">
          <option value="1">۱ دقیقه</option>
          <option value="2" selected>۲ دقیقه</option>
          <option value="3">۳ دقیقه</option>
        </select>
      </div>
      <button class="btn-generate" id="generateBtn" onclick="generate()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">ساخت پادکست</span>
      </button>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-label">پادکست ساخته شد</div>
    <audio id="audioPlayer" controls></audio>
    <a class="btn-download" id="downloadBtn" download="podcast.wav">
      ⬇ دانلود پادکست
    </a>
  </div>

  <footer>ساخته شده با Groq + Gemini TTS</footer>
</div>

<script>
const WORKER_URL = "https://tts-gemini.motanjf.workers.dev";

async function generate() {
  const topic = document.getElementById("topicInput").value.trim();
  if (!topic) return;

  const duration = parseInt(document.getElementById("durationSelect").value);

  const btn = document.getElementById("generateBtn");
  const spinner = document.getElementById("spinner");
  const btnText = document.getElementById("btnText");
  const resultCard = document.getElementById("resultCard");

  btn.disabled = true;
  spinner.style.display = "block";
  btnText.textContent = "در حال ساخت...";
  resultCard.classList.remove("visible");

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ topic, duration }),
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    if (!data.audioFiles || data.audioFiles.length === 0) {
      throw new Error("هیچ فایل صوتی تولید نشد");
    }

    // چسباندن تمام فایل‌های صوتی (Base64)
    const audioBlobs = data.audioFiles.map(base64 => {
      const byteChars = atob(base64);
      const byteArray = new Uint8Array(byteChars.length);
      for (let i = 0; i < byteChars.length; i++) {
        byteArray[i] = byteChars.charCodeAt(i);
      }
      return byteArray;
    });

    // محاسبه طول کل
    const totalLength = audioBlobs.reduce((sum, arr) => sum + arr.length, 0);
    const combined = new Uint8Array(totalLength);
    let offset = 0;
    for (const arr of audioBlobs) {
      combined.set(arr, offset);
      offset += arr.length;
    }

    // تبدیل به WAV (با همان تابع pcmToWav)
    const blob = pcmToWav(combined, 24000, 1, 16);
    const url = URL.createObjectURL(blob);

    document.getElementById("audioPlayer").src = url;
    document.getElementById("downloadBtn").href = url;
    resultCard.classList.add("visible");

  } catch (err) {
    alert("خطا: " + err.message);
  } finally {
    btn.disabled = false;
    spinner.style.display = "none";
    btnText.textContent = "ساخت پادکست";
  }
}

}
</script>
</body>
</html>
